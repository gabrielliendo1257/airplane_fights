server:
  port: 3434

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090

  datasource:
    username: piter
    password: piter
    url: jdbc:h2:mem:itinerary_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true

logging:
  level:
    root: info
    org.springframework.web: info
    org.springframework.security: debug
    org.springframework.security.oauth2: debug
    org.springframework.data.redis: debug
    web: debug